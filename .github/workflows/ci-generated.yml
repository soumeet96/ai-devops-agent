name: Rust Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: ~/cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-devops-agent .
          docker tag ${{ secrets.DOCKER_USERNAME }}/ai-devops-agent:latest ${{ secrets.DOCKER_USERNAME }}/ai-devops-agent:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-devops-agent:latest
      - name: Verify Docker image
        run: |
          docker run -t ${{ secrets.DOCKER_USERNAME }}/ai-devops-agent:latest --version
      - name: Deploy to production
        env:
          PRODUCTION_ENV: production
        run: |
          echo "Deploying to $PRODUCTION_ENV environment"