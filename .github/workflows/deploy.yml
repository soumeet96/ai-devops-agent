name: Deploy to Render

on:
  workflow_run:
    workflows: ["CI — Build, Test & Publish Docker Image"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "HTTP Status: %{http_code}\n"

      - name: Wait and verify deployment
        run: |
          echo "Waiting 60s for Render to deploy..."
          sleep 60
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_SERVICE_URL }}/sessions")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Deployment health check failed!"
            exit 1
          fi
          echo "Deployment successful!"
